<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Student Registration Form</title>
</head>
<body>
   <style>
    body{
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .form-card{
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    form{
      display: grid;
      gap: 12px;
    }

    label{
      display: block;
      margin-bottom: 4px;
    }

    input, select, textarea{
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .field-row, .checkbox-group, .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions{
      justify-content: flex-end;
    }

    button{
      padding: 8px 14px;
      cursor: pointer;
    }
  </style>
  <div class="form-card">
    <h1>Student Registration</h1>
    <form id="regForm">
      <div>
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>

      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div>
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" placeholder="+91 0000000000">
      </div>

      <div class="full-width">
        <label>Gender</label>
        <div class="field-row">
          <label><input type="radio" name="gender" value="Male" checked> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>

      <div>
        <label for="course">Course</label>
        <select id="course" name="course">
          <option value="">Select Course</option>
          <option>BE Core</option>
          <option>BE AI/ML</option>
          <option>BE FullStack</option>
          <option>BE DataScience</option>
        </select>
      </div>

      <div>
        <label>Skills</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
          <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
          <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
          <label><input type="checkbox" name="skills" value="Python"> Python</label>
        </div>
      </div>

      <div class="full-width">
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="1" placeholder="Street, City, State, ZIP"></textarea>
      </div>

      <div class="full-width actions">
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
